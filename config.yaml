feeds:
  world:
    - name: Guardian World
      url: https://www.theguardian.com/world/rss
      lang: en
      max_articles: 2

  canada:
    - name: CBC Top Stories
      url: https://www.cbc.ca/cmlink/rss-topstories
      lang: en
      max_articles: 2

  india_telugu:
    - name: BBC Telugu
      url: https://feeds.bbci.co.uk/telugu/rss.xml
      lang: te
      max_articles: 2
    - name: Andhra Jyothy
      url: https://andhrajyothy.com/rss/feed.xml
      lang: te
      max_articles: 1

  cricket:
    - name: ESPNCricinfo
      url: https://www.espncricinfo.com/rss/content/story/feeds/0.xml
      lang: en
      max_articles: 2

# Human-readable labels shown to the LLM for each feed category.
# Any category key missing here falls back to a humanised version of the key.
category_labels:
  world: World
  canada: Canada
  india_telugu: India / Telugu states
  cricket: Cricket

summary:
  target_words: 750
  provider: gemini       # "gemini" or "anthropic"
  prompt_file: prompts/summary_prompt.txt
  gemini:
    model: gemini-2.5-flash
  anthropic:
    model: claude-sonnet-4-6

tts:
  provider: google       # "google" or "openai"
  google:
    language_code: en-US
    voice: en-US-Neural2-F   # natural female; see cloud.google.com/text-to-speech/docs/voices
  openai:
    model: tts-1
    voice: alloy

delivery:
  notifier: whatsapp     # or "email"
  title: Daily audio news brief
  send_text: true        # also send the full summary text after the audio

output:
  file_prefix: brief-           # used for MP3 filename and GCS cleanup
  seen_filename: seen.json      # under state_dir

state_dir: state
output_dir: out
