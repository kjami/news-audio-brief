name: Daily Audio Brief

on:
  schedule:
    # 10:00 UTC daily = 6:00 AM Eastern (EDT) / 5:00 AM Eastern (EST).
    # Good enough for v1 — we don't try to follow DST precisely.
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state/seen.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg (for pydub MP3 concat)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # Optional — only needed if you switch providers in config.yaml
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          # Optional SMTP fallback
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit updated seen.json
        if: success()
        run: |
          if [ -n "$(git status --porcelain state/seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen.json after daily brief run"
            git push
          else
            echo "No changes to state/seen.json"
          fi
