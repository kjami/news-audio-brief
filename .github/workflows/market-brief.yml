name: Daily Market Brief

on:
  schedule:
    # 13:00 UTC Mon–Fri = 9:00 AM Eastern (EDT) / 8:00 AM (EST) — ~30 min
    # before US market open, so overnight + pre-market news is fresh.
    # Skips weekends since markets are closed.
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  market-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state/seen-market.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg (for pydub MP3 concat)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          # Optional — only needed if you switch providers in config-market.yaml
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          # Optional SMTP fallback
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py --config config-market.yaml

      - name: Commit updated seen-market.json
        if: success()
        run: |
          if [ -n "$(git status --porcelain state/seen-market.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen-market.json
            git commit -m "chore: update seen-market.json after market brief run"
            git push
          else
            echo "No changes to state/seen-market.json"
          fi
